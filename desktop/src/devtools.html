<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*; img-src 'self' file:;">
    <title>Hanako DevTools</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Songti SC', 'Georgia', serif;
            background: #F4F0E4;
            color: #3B3D3F;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── 顶部拖拽区 + 头像区 ── */
        .header {
            -webkit-app-region: drag;
            padding: 44px 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            border: 2px solid rgba(83, 125, 150, 0.15);
        }

        .title {
            font-size: 0.78rem;
            color: #8E9196;
            letter-spacing: 0.04em;
        }

        /* ── 按钮区 ── */
        .buttons {
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 12px;
            border: 1px solid rgba(83, 125, 150, 0.22);
            border-radius: 6px;
            background: #FAF8F2;
            color: #3B3D3F;
            font-family: inherit;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        .btn:hover {
            background: rgba(83, 125, 150, 0.08);
            border-color: rgba(83, 125, 150, 0.35);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .btn.full-width {
            grid-column: 1 / -1;
        }

        .btn-icon {
            font-size: 1rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .btn-label {
            white-space: nowrap;
        }

        /* 按钮反馈 toast */
        .btn-toast {
            font-size: 0.72rem;
            color: #7BAE7F;
            text-align: center;
            padding: 4px 0;
            min-height: 20px;
            flex-shrink: 0;
        }

        .btn-toast.error {
            color: #EC8F8D;
        }

        /* ── 日志面板 ── */
        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 24px 16px;
            min-height: 0;
        }

        .log-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding-bottom: 8px;
            flex-shrink: 0;
        }

        .log-header-line {
            flex: 1;
            height: 1px;
            background: rgba(83, 125, 150, 0.18);
            max-width: 48px;
        }

        .log-header-text {
            font-size: 0.72rem;
            color: #8E9196;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .log-panel {
            flex: 1;
            background: #F0EDE4;
            border: 1px solid rgba(83, 125, 150, 0.15);
            border-radius: 6px;
            overflow-y: auto;
            padding: 8px 10px;
            font-size: 0.72rem;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            color: #6B6F73;
            line-height: 1.6;
        }

        .log-panel::-webkit-scrollbar {
            width: 4px;
        }

        .log-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-panel::-webkit-scrollbar-thumb {
            background: rgba(83, 125, 150, 0.2);
            border-radius: 2px;
        }

        .log-line {
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line.heartbeat {
            color: #537D96;
        }

        .log-line.error {
            color: #EC8F8D;
        }

        .log-line.system {
            color: #8E9196;
            font-style: italic;
        }

        .log-empty {
            color: #8E9196;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        /* ── 活动面板 ── */
        .activity-panel {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .activity-panel::-webkit-scrollbar {
            width: 4px;
        }

        .activity-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .activity-panel::-webkit-scrollbar-thumb {
            background: rgba(83, 125, 150, 0.2);
            border-radius: 2px;
        }

        .act-item {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(83, 125, 150, 0.1);
            cursor: default;
            transition: background 0.12s;
        }

        .act-item:hover {
            background: rgba(83, 125, 150, 0.05);
        }

        .act-item:last-child {
            border-bottom: none;
        }

        .act-summary {
            font-size: 0.76rem;
            color: #3B3D3F;
            line-height: 1.45;
        }

        .act-meta {
            font-size: 0.65rem;
            color: #8E9196;
            margin-top: 2px;
        }

        .act-file {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.6rem;
            color: #537D96;
            margin-top: 2px;
            opacity: 0.7;
        }

        .act-item.error .act-summary {
            color: #EC8F8D;
        }

        /* ── System Prompt 面板 ── */
        .prompt-panel {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px;
            font-size: 0.72rem;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            color: #3B3D3F;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            background: #F0EDE4;
            border: 1px solid rgba(83, 125, 150, 0.15);
            border-radius: 6px;
        }

        .prompt-panel::-webkit-scrollbar {
            width: 4px;
        }

        .prompt-panel::-webkit-scrollbar-track {
            background: transparent;
        }

        .prompt-panel::-webkit-scrollbar-thumb {
            background: rgba(83, 125, 150, 0.2);
            border-radius: 2px;
        }

        .prompt-section-title {
            color: #537D96;
            font-weight: 600;
        }

        .prompt-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 6px;
            font-size: 0.68rem;
            color: #8E9196;
            flex-shrink: 0;
        }

        .prompt-meta-btn {
            font-family: inherit;
            font-size: 0.68rem;
            color: #537D96;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            -webkit-app-region: no-drag;
        }

        .prompt-meta-btn:hover {
            background: rgba(83, 125, 150, 0.1);
        }

        .panel-toggle-tabs {
            display: flex;
            gap: 0;
            flex-shrink: 0;
        }

        .panel-toggle-tab {
            flex: 1;
            font-family: inherit;
            font-size: 0.7rem;
            color: #8E9196;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 6px 0;
            cursor: pointer;
            transition: color 0.12s, border-color 0.12s;
            -webkit-app-region: no-drag;
        }

        .panel-toggle-tab:hover {
            color: #6B6F73;
        }

        .panel-toggle-tab.active {
            color: #537D96;
            border-bottom-color: #537D96;
            font-weight: 600;
        }

        .panel-body {
            flex: 1;
            min-height: 0;
            display: none;
        }

        .panel-body.active {
            display: flex;
            flex-direction: column;
        }

        /* Windows/Linux 窗口控制按钮（不依赖 styles.css）*/
        .titlebar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            -webkit-app-region: drag;
            z-index: 100;
            pointer-events: none;
            background: transparent;
        }
        .window-controls {
            position: absolute;
            right: 0; top: 0;
            height: 100%;
            display: flex;
            align-items: stretch;
            -webkit-app-region: no-drag;
            pointer-events: auto;
        }
        .wc-btn {
            width: 46px;
            height: 100%;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .wc-btn:hover { background: rgba(0,0,0,0.06); }
        .wc-close:hover { background: #e81123; color: #fff; }
        /* Windows/Linux：无红绿灯，减少 header 顶部 padding */
        html[data-platform="win32"] .header,
        html[data-platform="linux"] .header {
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <!-- Windows/Linux 窗口控制按钮注入点 -->
    <div class="titlebar"></div>
    <div class="header">
        <img class="avatar" id="avatar" src="assets/Hanako.png" alt="Hanako" draggable="false">
        <div class="title">Hanako DevTools</div>
    </div>

    <div class="buttons">
        <button class="btn" id="btnHeartbeat">
            <span class="btn-icon">💓</span>
            <span class="btn-label">心跳巡检</span>
        </button>
        <button class="btn" id="btnMemory">
            <span class="btn-icon">📦</span>
            <span class="btn-label">记忆导出</span>
        </button>
        <button class="btn" id="btnOnboarding">
            <span class="btn-icon">🧭</span>
            <span class="btn-label">Onboarding</span>
        </button>
        <button class="btn" id="btnOnboardingPreview">
            <span class="btn-icon">👁</span>
            <span class="btn-label">预览引导</span>
        </button>
        <button class="btn" id="btnReload">
            <span class="btn-icon">🔄</span>
            <span class="btn-label">刷新前端</span>
        </button>
    </div>

    <div class="btn-toast" id="toast"></div>

    <div class="log-section">
        <div class="panel-toggle-tabs">
            <button class="panel-toggle-tab active" data-panel="logs">活动日志</button>
            <button class="panel-toggle-tab" data-panel="activities">Session 列表</button>
            <button class="panel-toggle-tab" data-panel="prompt">System Prompt</button>
        </div>
        <div class="panel-body active" data-panel="logs">
            <div class="log-panel" id="logPanel">
                <div class="log-empty">等待连接...</div>
            </div>
        </div>
        <div class="panel-body" data-panel="activities">
            <div class="activity-panel" id="activityPanel">
                <div class="log-empty">加载中...</div>
            </div>
        </div>
        <div class="panel-body" data-panel="prompt">
            <div class="prompt-meta">
                <span id="promptMeta"></span>
                <button class="prompt-meta-btn" id="promptRefresh">刷新</button>
            </div>
            <div class="prompt-panel" id="promptPanel">
                <div class="log-empty">点击上方「刷新」加载</div>
            </div>
        </div>
    </div>

    <script>
        const MAX_LINES = 200;
        let serverPort = null;
        let serverToken = null;
        let ws = null;
        let logLines = [];

        /** 带认证的 fetch */
        function hanaFetch(path, opts = {}) {
            const headers = { ...opts.headers };
            if (serverToken) headers["Authorization"] = `Bearer ${serverToken}`;
            return fetch(`http://127.0.0.1:${serverPort}${path}`, { ...opts, headers });
        }

        const logPanel = document.getElementById("logPanel");
        const toast = document.getElementById("toast");

        // ── 初始化 ──
        async function init() {
            // 获取 server port
            serverPort = await window.hana?.getServerPort?.();
            serverToken = await window.hana?.getServerToken?.();
            if (!serverPort) {
                showLog("system", "等待 Server 启动...");
                // 轮询等待
                const poll = setInterval(async () => {
                    serverPort = await window.hana?.getServerPort?.();
                    serverToken = await window.hana?.getServerToken?.();
                    if (serverPort) {
                        clearInterval(poll);
                        onReady();
                    }
                }, 1000);
                return;
            }
            onReady();
        }

        async function onReady() {
            showLog("system", `Server 已连接 (port ${serverPort})`);

            // 加载头像
            try {
                const avatarPath = await window.hana?.getAvatarPath?.("agent");
                if (avatarPath) {
                    document.getElementById("avatar").src = `file://${avatarPath}?t=${Date.now()}`;
                }
            } catch {}

            // 获取历史日志
            try {
                const res = await hanaFetch(`/api/desk/logs`);
                const data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    clearLog();
                    for (const entry of data.logs) {
                        showLog(entry.level || "info", entry.text);
                    }
                }
            } catch {}

            // WS 连接
            connectWS();
        }

        function connectWS() {
            if (ws) return;
            try {
                const tkParam = serverToken ? `?token=${serverToken}` : "";
                ws = new WebSocket(`ws://127.0.0.1:${serverPort}/ws${tkParam}`);
                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);
                        if (msg.type === "devlog") {
                            showLog(msg.level || "info", msg.text);
                        } else if (msg.type === "activity_update" && msg.activity) {
                            activityEntries.unshift(msg.activity);
                            renderActivities();
                            // 心跳按钮等待中 → 调小模型摘要
                            if (waitingHeartbeat && msg.activity.type === "heartbeat") {
                                waitingHeartbeat = false;
                                btnHeartbeat.classList.remove("loading");
                                fetchQuickSummary(msg.activity.id);
                            }
                        }
                    } catch {}
                };
                ws.onclose = () => {
                    ws = null;
                    setTimeout(connectWS, 3000);
                };
                ws.onerror = () => {
                    ws?.close();
                };
            } catch {
                setTimeout(connectWS, 3000);
            }
        }

        // ── 日志 ──
        function clearLog() {
            logLines = [];
            logPanel.innerHTML = "";
        }

        function showLog(level, text) {
            // 首次日志时清掉 "等待连接..."
            if (logPanel.querySelector(".log-empty")) {
                logPanel.innerHTML = "";
            }

            const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
            const line = document.createElement("div");
            line.className = "log-line";

            if (level === "heartbeat" || text.includes("[heartbeat]")) {
                line.classList.add("heartbeat");
            } else if (level === "error") {
                line.classList.add("error");
            } else if (level === "system") {
                line.classList.add("system");
            }

            line.textContent = `${time}  ${text}`;
            logPanel.appendChild(line);
            logLines.push(line);

            // 截断
            while (logLines.length > MAX_LINES) {
                const old = logLines.shift();
                old.remove();
            }

            // 自动滚底
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        // ── Toast ──
        let toastTimer = null;
        function showToast(text, isError = false, duration = 3000) {
            toast.textContent = text;
            toast.className = "btn-toast" + (isError ? " error" : "");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.textContent = ""; }, duration);
        }

        // ── 小模型快速摘要（DevTools 专用） ──
        async function fetchQuickSummary(activityId) {
            showToast("💓 正在生成摘要...");
            try {
                const res = await hanaFetch(`/api/desk/activities/summarize`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: activityId }),
                });
                const data = await res.json();
                if (data.summary) {
                    showToast(`💓 ${data.summary}`, false, 8000);
                } else {
                    showToast("💓 心跳完成（无摘要）", false, 5000);
                }
            } catch {
                showToast("💓 心跳完成", false, 5000);
            }
        }

        // ── 下方面板 Tab 切换 ──
        let activitiesLoaded = false;
        let activityEntries = [];
        const activityPanel = document.getElementById("activityPanel");
        const panelTabs = document.querySelectorAll(".panel-toggle-tab");
        const panelBodies = document.querySelectorAll(".panel-body");

        let promptLoaded = false;

        panelTabs.forEach(tab => {
            tab.addEventListener("click", () => {
                const target = tab.dataset.panel;
                panelTabs.forEach(t => t.classList.toggle("active", t.dataset.panel === target));
                panelBodies.forEach(b => b.classList.toggle("active", b.dataset.panel === target));
                if (target === "activities" && !activitiesLoaded) {
                    loadActivities();
                }
                if (target === "prompt" && !promptLoaded) {
                    loadSystemPrompt();
                }
            });
        });

        async function loadActivities() {
            try {
                const res = await hanaFetch(`/api/desk/activities`);
                const data = await res.json();
                activityEntries = data.activities || [];
                activitiesLoaded = true;
                renderActivities();
            } catch (e) {
                activityPanel.innerHTML = `<div class="log-empty">加载失败: ${e.message?.replace(/</g, "&lt;")}</div>`;
            }
        }

        function renderActivities() {
            activityPanel.innerHTML = "";
            if (activityEntries.length === 0) {
                activityPanel.innerHTML = `<div class="log-empty">暂无活动记录</div>`;
                return;
            }
            for (const a of activityEntries) {
                const item = document.createElement("div");
                item.className = "act-item" + (a.status === "error" ? " error" : "");

                const icon = a.type === "heartbeat" ? "💓" : "⏰";
                const summary = document.createElement("div");
                summary.className = "act-summary";
                summary.textContent = `${icon}  ${a.summary || (a.type === "heartbeat" ? "心跳巡检" : "定时任务")}`;
                item.appendChild(summary);

                const meta = document.createElement("div");
                meta.className = "act-meta";
                const parts = [];
                if (a.startedAt) parts.push(formatTime(a.startedAt));
                parts.push(a.type === "heartbeat" ? "自动巡检" : "定时任务");
                if (a.finishedAt && a.startedAt) {
                    const dur = Math.round((a.finishedAt - a.startedAt) / 1000);
                    parts.push(dur >= 60 ? `${Math.floor(dur/60)}分${dur%60}秒` : `${dur}秒`);
                }
                meta.textContent = parts.join(" · ");
                item.appendChild(meta);

                if (a.sessionFile) {
                    const file = document.createElement("div");
                    file.className = "act-file";
                    file.textContent = a.sessionFile;
                    item.appendChild(file);
                }

                activityPanel.appendChild(item);
            }
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            const diffHr = Math.floor(diffMs / 3600000);
            if (diffMin < 1) return "刚刚";
            if (diffMin < 60) return `${diffMin}分钟前`;
            if (diffHr < 24) return `${diffHr}小时前`;
            return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        }

        // ── System Prompt ──
        const promptPanel = document.getElementById("promptPanel");
        const promptMeta = document.getElementById("promptMeta");

        async function loadSystemPrompt() {
            try {
                const res = await hanaFetch(`/api/system-prompt`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                const content = data.content || "(空)";
                promptPanel.textContent = content;
                const charCount = content.length;
                const tokenEst = Math.round(charCount / 1.5);
                promptMeta.textContent = `${charCount} 字 ≈ ${tokenEst} tokens`;
                promptLoaded = true;
            } catch (e) {
                promptPanel.innerHTML = `<div class="log-empty">加载失败: ${e.message?.replace(/</g, "&lt;")}</div>`;
            }
        }

        document.getElementById("promptRefresh").addEventListener("click", loadSystemPrompt);

        // ── 按钮 ──
        let waitingHeartbeat = false; // 正在等待心跳完成
        const btnHeartbeat = document.getElementById("btnHeartbeat");

        btnHeartbeat.addEventListener("click", async function () {
            this.classList.add("loading");
            try {
                const res = await hanaFetch(`/api/desk/heartbeat`, { method: "POST" });
                const data = await res.json();
                if (data.ok) {
                    showToast("💓 心跳执行中...");
                    waitingHeartbeat = true;
                } else {
                    showToast(data.error || "触发失败", true);
                    this.classList.remove("loading");
                }
            } catch (e) {
                showToast("请求失败: " + e.message, true);
                this.classList.remove("loading");
            }
            // loading 状态在 activity_update 回调里移除
        });

        document.getElementById("btnMemory").addEventListener("click", async function () {
            this.classList.add("loading");
            try {
                const res = await hanaFetch(`/api/memories/export`);
                const data = await res.json();
                // 触发下载
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `hanako-memories-${new Date().toISOString().slice(0, 10)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast("记忆已导出");
            } catch (e) {
                showToast("导出失败: " + e.message, true);
            }
            this.classList.remove("loading");
        });

        document.getElementById("btnOnboarding").addEventListener("click", async function () {
            try {
                await window.hana?.debugOpenOnboarding?.();
                showToast("🧭 Onboarding 窗口已打开");
            } catch (e) {
                showToast("打开失败: " + e.message, true);
            }
        });

        document.getElementById("btnOnboardingPreview").addEventListener("click", async function () {
            try {
                await window.hana?.debugOpenOnboardingPreview?.();
                showToast("👁 预览模式已打开");
            } catch (e) {
                showToast("打开失败: " + e.message, true);
            }
        });

        document.getElementById("btnReload").addEventListener("click", async function () {
            try {
                await window.hana?.reloadMainWindow?.();
                showToast("前端已刷新");
            } catch (e) {
                showToast("刷新失败: " + e.message, true);
            }
        });
